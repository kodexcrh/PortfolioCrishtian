    d="M 84,234
       C 58,234 38,214 40,188
       C 42,166 58,150 79,146
       C 77,116 99,92 130,88
       C 150,84 170,94 182,110
       C 192,94 210,84 232,84
       C 264,84 288,108 288,140
       C 288,142 288,144 287,146
       C 308,150 324,168 324,190
       C 326,218 306,238 278,240
       L 84,234 Z"
    fill="none"
    stroke="#8B5CF6"
    stroke-width="20"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Flechas >> dentro de la nube -->
  <g fill="none" stroke="#8B5CF6" stroke-width="17" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="142,158 168,188 142,218" />
    <polyline points="174,158 200,188 174,218" />
    <polyline points="206,158 232,188 206,218" />
  </g>

  <!-- Cloud Coders texto -->
  <text x="200" y="300"
    text-anchor="middle"
    font-family="'Trebuchet MS', 'Segoe UI', Arial, sans-serif"
    font-size="50" font-weight="700" fill="#ffffff" letter-spacing="-1">
