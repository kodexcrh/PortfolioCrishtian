  </text>

  <!-- Slogan -->
  <text x="200" y="338"
    text-anchor="middle"
    font-family="'Trebuchet MS', 'Segoe UI', Arial, sans-serif"
    font-size="20" font-weight="400" fill="#9090b8" letter-spacing="0.5">
    Su negocio, Nuestro dominio
  </text>
